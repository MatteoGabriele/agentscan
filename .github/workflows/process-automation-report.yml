name: Process Automation Report

on:
  issues:
    types: [opened, edited]

jobs:
  process-report:
    if: contains(github.event.issue.labels.*.name, 'automation')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Parse issue and generate entry
        id: parse
        run: |
          npx tsx scripts/parse-automation-issue.ts \
            '${{ github.event.issue.body }}' \
            '${{ github.event.issue.html_url }}' \
            $(date -u +%Y-%m-%d) \
          || (echo "Parse failed" && exit 1)

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create or Update Pull Request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          BRANCH_NAME="automation/add-${{ github.event.issue.number }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            # Branch exists, check out and update it
            git fetch origin "$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
            git rebase origin/main || git merge origin/main
          else
            # Branch doesn't exist, create it
            git checkout -b "$BRANCH_NAME"
          fi

          # Stage and commit changes
          git add data/verified-automations-list.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add verified automation entry" -m "Closes #$ISSUE_NUMBER" || true
          fi

          # Push to remote
          git push origin "$BRANCH_NAME" --force-with-lease

          # Check if PR already exists for this branch
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --state all --json number -q '.[0].number' || echo "")

          if [ -z "$PR_NUMBER" ]; then
            # Create new PR if it doesn't exist
            gh pr create \
              --title "Add verified automation: ${{ github.event.issue.title }}" \
              --body "Automated submission from ${{ github.event.issue.html_url }}" \
              --body "This entry has been automatically validated and formatted. Ready for merge." \
              --label automation
          else
            # PR already exists, just ensure it's open
            gh pr reopen "$PR_NUMBER" 2>/dev/null || true
            echo "Updated existing PR #$PR_NUMBER"
          fi
