name: Process Automation Report

on:
  issues:
    types: [opened, edited]

jobs:
  process-report:
    if: contains(github.event.issue.labels.*.name, 'automation')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Parse issue and generate entry
        id: parse
        run: |
          npx tsx scripts/parse-automation-issue.ts \
            '${{ github.event.issue.body }}' \
            '${{ github.event.issue.html_url }}' \
            $(date -u +%Y-%m-%d) \
          || (echo "Parse failed" && exit 1)

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create Pull Request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          BRANCH_NAME="automation/add-${{ github.event.issue.number }}"

          # Delete remote branch if it exists
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          git checkout -b "$BRANCH_NAME"
          git add data/verified-automations-list.json
          git commit -m "chore: add verified automation entry" -m "Closes #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"
          gh pr create \
            --title "Add verified automation: ${{ github.event.issue.title }}" \
            --body "Automated submission from ${{ github.event.issue.html_url }}" \
            --body "Please review and approve to merge this verified automation entry." \
            --label automation
