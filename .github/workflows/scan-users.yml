name: Daily User Scan

on:
  schedule:
    - cron: "0 0 1,8,15,22,29 * *" # Days 1,8,15,22,29 at 00:00 UTC
    - cron: "26 3 2,9,16,23,30 * *" # Days 2,9,16,23,30 at 03:26 UTC
    - cron: "51 6 3,10,17,24,31 * *" # Days 3,10,17,24,31 at 06:51 UTC
    - cron: "17 10 4,11,18,25 * *" # Days 4,11,18,25 at 10:17 UTC
    - cron: "43 13 5,12,19,26 * *" # Days 5,12,19,26 at 13:43 UTC
    - cron: "9 17 6,13,20,27 * *" # Days 6,13,20,27 at 17:09 UTC
    - cron: "34 20 7,14,21,28 * *" # Days 7,14,21,28 at 20:34 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run user scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec tsx scripts/scan-users.ts

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes detected"
          else
            git add data/scan-results.json
            git commit -m "chore: daily user scan - $(date -u +'%Y-%m-%d')"
            git fetch origin main
            git merge --no-edit origin/main
            git push
          fi
