name: Daily User Scan

on:
  schedule:
    - cron: "0 22 * * *" # Runs daily at 22:00 UTC (00:00 CEST/01:00 CET Amsterdam)
  workflow_dispatch: # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run user scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec tsx scripts/scan-users.ts

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes detected"
          else
            git add data/scanned-users-hashes.json data/scan-results.json
            git commit -m "chore: daily user scan - $(date -u +'%Y-%m-%d')"
            git push
          fi
