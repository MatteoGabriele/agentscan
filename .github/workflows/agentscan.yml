name: AgentScan

on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened]

jobs:
  agentscan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: AgentScan
        uses: MatteoGabriele/agentscan-action@c1e9bd6566b47b8d6d6801938fbe86fffc8be4ac
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-close: true
          auto-close-classifications: '["automations", "mixed"]'
          message-organic: "![](https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExcmhjcHc0dnd1YWVsYjgwaGgycHRtdW9qbnBicmp6cHJncnNta2hqcyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Ae7SI3LoPYj8Q/giphy.gif)"
